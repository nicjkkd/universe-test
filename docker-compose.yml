services:
  psql:
    container_name: psql
    image: postgres:16
    environment:
      POSTGRES_DB: "legaltech_test"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "root"
    ports:
      - "5432:5432"
    volumes:
      - ./psql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    container_name: localstack
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "./init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh"
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15

  products-service:
    build:
      context: ./products-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:root@psql:5432/legaltech_test
      SQS_ENDPOINT: http://localstack:4566
      SQS_REGION: us-east-1
      SQS_QUEUE_URL: http://localstack:4566/000000000000/test-queue
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      PORT: 3001
    depends_on:
      psql:
        condition: service_healthy
      localstack:
        condition: service_healthy

  notifications-service:
    build:
      context: ./notifications-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      SQS_ENDPOINT: http://localstack:4566
      SQS_REGION: us-east-1
      SQS_QUEUE_URL: http://localstack:4566/000000000000/test-queue
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      PORT: 3002
    depends_on:
      localstack:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - products-service
